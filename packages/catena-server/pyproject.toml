[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "catena-server"
version = "0.1.0"
description = "Catena server CLI."
requires-python = ">=3.11"
dependencies = [
  "catena-common @ file:../catena-common",
  "typer>=0.12,<1.0",
]

[project.scripts]
catena-server = "catena_server.cli:app"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
