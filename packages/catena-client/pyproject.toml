[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "catena-client"
version = "0.1.0"
description = "Catena client CLI."
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.0,<3.0",
  "typer>=0.12,<1.0",
]

[project.scripts]
catena-client = "catena_client.cli:app"

[tool.setuptools]
packages = ["catena_client", "catena_common"]

[tool.setuptools.package-data]
catena_common = ["pythia8/Makefile.inc"]

[tool.setuptools.package-dir]
catena_client = "src/catena_client"
catena_common = "../catena-common/src/catena_common"
